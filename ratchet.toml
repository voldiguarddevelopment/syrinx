# Syrinx — Ratchet harness config.
# Run:  cd ~/development/syrinx-build && ratchet run
# (loads the document trio, drives the test-first loop, serves the web dashboard).

[project]
stack = "rust"
root  = "."

[claude]
model      = "claude-opus-4-8"
extra_args = ["--dangerously-skip-permissions"]

[budget]
max_attempts_per_task = 6
max_iterations        = 600

# Web control panel: `ratchet run` serves the dashboard at http://localhost:7878.
# operator + [web.allow] gate the run-control buttons (localhost-only anyway).
[web]
enabled  = true
port     = 7879
operator = true

[web.allow]
run    = true
cancel = true
verify = true

# GitHub: public repo voldiguarddevelopment/syrinx. Token is env-only (CI_TOKEN),
# never here. Remote gates can be enabled once the gate workflows are wired.
[github]
repo = "voldiguarddevelopment/syrinx"

# GitHub CI offload (F8). The workflows live in .github/workflows/. Ready but OFF:
# for light tasks, local mutation/regression is far faster than a CI round-trip
# (cold cargo-install of ratchet + build per gate). Flip enabled=true when a task's
# local gates get heavy. Requires: the RATCHET_INSTALL_TOKEN repo secret (read access
# to the private Ratchet repo, same value as mend's) AND a one-time plant-validation
# on a real runner before the remote verdict is trusted. Free GitHub-hosted runners
# (no GPU): this offloads deterministic Rust gates only — it does NOT enable the
# GPU/model/perceptual tasks (those stay blocked-on-human).
[remote_gates]
enabled    = false
regression = false
remote     = "origin"
