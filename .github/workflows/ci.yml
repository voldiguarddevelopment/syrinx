# Continuous integration for Syrinx — independent verification of every push.
# Runs async on GitHub (never blocks the local Ratchet loop): the loop's own
# deterministic gates (checker/compile/test/mutation) stay local where they are
# fastest for these light parity tasks; this re-runs the full committed suite on
# a clean runner so a passing main is proven off the build box too.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # fmt + clippy are ADVISORY: the Ratchet loop gates on checker/compile/test/
      # mutation, not rustfmt, so style drift must not red the build. Build + test
      # are the hard gates — the real independent proof that main compiles and its
      # frozen parity suite passes on a clean runner off the build box.
      - name: Format (advisory)
        continue-on-error: true
        run: cargo fmt --all --check
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace -- --test-threads=1
