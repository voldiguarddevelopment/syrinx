# Workspace-scaffold test host â€” task T-00.01.
#
# RED phase: this is a plain package so the frozen scaffold tests in tests/
# compile and run from the worktree root (where the gate invokes `cargo test`).
# Those tests fail because the eleven-crate workspace does not exist yet.
#
# GREEN phase: turn this root into the workspace by adding a [workspace] table
# with `resolver = "2"` and the eleven members under crates/, and creating each
# empty member crate. This package stays the workspace root so the frozen tests
# keep running. Do NOT edit the frozen test file.
[package]
name = "syrinx-workspace-scaffold-tests"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]
resolver = "2"
members = [
    "crates/syrinx-frontend",
    "crates/syrinx-core",
    "crates/syrinx-lm",
    "crates/syrinx-speaker",
    "crates/syrinx-acoustic",
    "crates/syrinx-vocoder",
    "crates/syrinx-prosody",
    "crates/syrinx-stream",
    "crates/syrinx-serve",
    "crates/syrinx-eval",
    "crates/syrinx-cli",
]

# Dev-deps for the frozen integration tests under tests/. `syrinx-eval` hosts the
# eval-harness skeleton (T-00.03); `serde_json` is used by the tests to parse the
# metrics JSON the harness writes. These appear on the root package only, so they
# do not touch the [workspace]/members assertions the scaffold tests pin.
[dev-dependencies]
syrinx-eval = { path = "crates/syrinx-eval" }
serde_json = "1"
# T-01.01 frontend frozen tests drive the deterministic text normalizer through
# the root `tests/`. `unicode-normalization` lets the C1 test assert `is_nfc`
# directly. RED: `syrinx-frontend` exposes no `normalize` module yet, so the test
# target fails to build; GREEN adds it.
syrinx-frontend = { path = "crates/syrinx-frontend" }
unicode-normalization = "0.1"
# T-03.01 prosody-plan frozen tests drive the editable prosody-plan data model
# (`syrinx-prosody::plan`) through the root `tests/`. RED: the crate exposes no
# `plan` module yet, so the test target fails to build; GREEN adds it.
syrinx-prosody = { path = "crates/syrinx-prosody" }
# T-08.01 audio-server scaffold frozen tests drive the Axum `/v1/audio/speech`
# route and the pluggable synth trait (`syrinx-serve`) through the root `tests/`.
# RED: `syrinx-serve` exposes no router/request/synth types yet, so the test
# target fails to build; GREEN adds them. axum/tower/tokio/http-body let the test
# drive the router via `tower`'s `oneshot` and inspect the response shape.
syrinx-serve = { path = "crates/syrinx-serve" }
axum = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
http-body = "1"
# T-02.01a core-arith frozen tests drive `syrinx-core`'s `Tensor` plus the
# `matmul`/`add`/`mul` reference path and its typed `ShapeError`, gated on the
# parity goldens under `tests/golden/parity/`, through the root `tests/`. RED:
# `syrinx-core` exposes no `Tensor`/`matmul`/`add`/`mul`/`ShapeError` yet, so the
# test target fails to build; GREEN adds them. `serde_json` (already a dev-dep
# above) parses the goldens.
syrinx-core = { path = "crates/syrinx-core" }
# T-02.02a multi-head causal attention frozen tests drive `syrinx-lm::attention`
# (which composes the `syrinx-core` primitives) through the root `tests/`. RED:
# `syrinx-lm` exposes no `attention` yet, so `tests/attention_prop.rs` fails to
# build; GREEN adds it. The test also uses `syrinx-core`'s `Tensor`/`linear`/
# `rope`/`weights` (already a dep above) to build inputs and an independent
# reference.
syrinx-lm = { path = "crates/syrinx-lm" }
