# Workspace-scaffold test host — task T-00.01.
#
# RED phase: this is a plain package so the frozen scaffold tests in tests/
# compile and run from the worktree root (where the gate invokes `cargo test`).
# Those tests fail because the eleven-crate workspace does not exist yet.
#
# GREEN phase: turn this root into the workspace by adding a [workspace] table
# with `resolver = "2"` and the eleven members under crates/, and creating each
# empty member crate. This package stays the workspace root so the frozen tests
# keep running. Do NOT edit the frozen test file.
[package]
name = "syrinx-workspace-scaffold-tests"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]
resolver = "2"
members = [
    "crates/syrinx-frontend",
    "crates/syrinx-lm",
    "crates/syrinx-speaker",
    "crates/syrinx-acoustic",
    "crates/syrinx-vocoder",
    "crates/syrinx-prosody",
    "crates/syrinx-serve",
    "crates/syrinx-eval",
    "crates/syrinx-cli",
    "crates/syrinx-fish",
]

# Dev-deps for the integration tests under tests/. The real_* parity/eval tests
# parse JSON goldens (`serde_json`); the audio-server tests drive the Axum
# `/v1/audio/speech` router via `tower::oneshot` (axum/tower/tokio/http-body).
[dev-dependencies]
serde_json = "1"
axum = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
http-body = "1"

# The real ports are the primary surface and are ON BY DEFAULT (see `[features]`).
# The real-model (Candle) parity/eval tests live at the repo root (`tests/real_*.rs`)
# — member crates host no tests. `syrinx-lm` is non-optional; the rest are pulled in
# by the default `real` feature.
[dependencies]
syrinx-lm = { path = "crates/syrinx-lm" }
syrinx-speaker = { path = "crates/syrinx-speaker", optional = true }
syrinx-acoustic = { path = "crates/syrinx-acoustic", optional = true }
syrinx-vocoder = { path = "crates/syrinx-vocoder", optional = true }
# Optional normal dep (in addition to the dev-dep above) so the root `real`
# feature can toggle `syrinx-frontend/real` for the text-tokenizer parity test
# at the repo root. Mirrors how syrinx-speaker is wired.
syrinx-frontend = { path = "crates/syrinx-frontend", optional = true }
# Optional normal dep (in addition to the dev-dep above) so the root `real`
# feature can toggle `syrinx-serve/real` for the end-to-end synthesizer parity
# tests at the repo root. Mirrors how syrinx-frontend is wired.
syrinx-serve = { path = "crates/syrinx-serve", optional = true }
# Optional normal dep (in addition to the dev-dep above) so the root `real` feature
# can toggle `syrinx-eval/real` for the measured-metrics test (`tests/real_eval_metrics.rs`).
syrinx-eval = { path = "crates/syrinx-eval", optional = true }
# Optional normal dep so the root `real` feature can toggle `syrinx-fish/real` for the
# Fish Audio e2e + parity tests at the repo root (`tests/real_fish_*.rs`). Mirrors how
# syrinx-serve / syrinx-eval are wired.
syrinx-fish = { path = "crates/syrinx-fish", optional = true }
candle-core = { version = "0.8", optional = true }

[features]
# The real CosyVoice2/3 ports are the primary build — ON BY DEFAULT, so a plain
# `cargo build` / `cargo test` builds the real model stack (Candle as a normal dep)
# and the `real_*` + `tn` tests.
default = ["real", "tn"]
real = [
    "dep:candle-core",
    "dep:syrinx-speaker",
    "dep:syrinx-acoustic",
    "dep:syrinx-vocoder",
    "dep:syrinx-frontend",
    "dep:syrinx-serve",
    "syrinx-lm/real",
    "syrinx-speaker/real",
    "syrinx-acoustic/real",
    "syrinx-vocoder/real",
    "syrinx-frontend/real",
    "syrinx-serve/real",
    "dep:syrinx-eval",
    "syrinx-eval/real",
    "dep:syrinx-fish",
    "syrinx-fish/real",
]
# Text-normalizer parity track: enables `syrinx-frontend/textnorm` for the root
# `tests/real_textnorm_parity.rs` test. Lightweight (pure Rust, no model deps), so
# the text-level parity check builds + runs fast without the `real` model stack.
tn = ["dep:syrinx-frontend", "syrinx-frontend/tn"]
# GPU (CUDA) speed path for the root harness/tests: `real` plus Candle's CUDA
# backend on every sub-crate that runs Candle. Lets the optional GPU smoke test
# (`tests/real_gpu_synth.rs`, gated `#![cfg(feature="real")]`) and any root binary
# open `cuda:i`. Output is not bit-equal to the CPU reference — CUDA is for speed
# only; the CPU parity tests are unaffected and stay the numeric reference.
cuda = [
    "real",
    "candle-core/cuda",
    "syrinx-lm/cuda",
    "syrinx-speaker/cuda",
    "syrinx-acoustic/cuda",
    "syrinx-vocoder/cuda",
    "syrinx-serve/cuda",
    "syrinx-fish/cuda",
]
